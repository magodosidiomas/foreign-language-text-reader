<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  READER  —  single-file app                             ║
  ║                                                          ║
  ║  Views:                                                  ║
  ║    #view-home    Language selector + text list           ║
  ║    #view-reader  Full text reader                        ║
  ║    #view-sentence Sentence-by-sentence mode              ║
  ║                                                          ║
  ║  Key features in this build:                             ║
  ║    • Homepage with text list (no persistent sidebar)     ║
  ║    • Move text between languages (edit modal)            ║
  ║    • Language auto-detect via trigram scoring (offline)  ║
  ║    • Sentence slider navigation (click + drag + swipe)   ║
  ║    • Finish options: close session / back to full text   ║
  ╚══════════════════════════════════════════════════════════╝
-->

<style>
/* ═══════════════════════════════════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #111213;
  --surface:   #18191b;
  --surface2:  #202224;
  --surface3:  #2a2d30;
  --border:    #2e3135;
  --border2:   #3a3e44;
  --text:      #e2e4e7;
  --text-2:    #9aa0aa;
  --text-3:    #5e6470;
  --accent:    #5b8dee;
  --accent-bg: rgba(91,141,238,.13);
  --yellow-bg: rgba(245,200,66,.18);
  --red:       #e05b5b;
  --radius:    8px;
  --radius-lg: 14px;
  --font-ui:   'DM Sans', sans-serif;
  --font-read: 'Lora', Georgia, serif;
  --tr:        150ms ease;
}

html, body {
  height: 100%; font-family: var(--font-ui);
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.5; overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW SYSTEM  — only one view visible at a time
   ═══════════════════════════════════════════════════════════════════ */
.view {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  background: var(--bg); overflow: hidden;
}
.view.active { display: flex; }

/* ═══════════════════════════════════════════════════════════════════
   SHARED TOPBAR
   ═══════════════════════════════════════════════════════════════════ */
.topbar {
  height: 52px; display: flex; align-items: center; gap: 10px;
  padding: 0 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.topbar-title {
  flex: 1; font-size: 15px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar-title.dim { color: var(--text-2); font-weight: 400; }

/* ═══════════════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  border: none; border-radius: var(--radius); cursor: pointer;
  font: inherit; font-size: 13px; font-weight: 500; padding: 8px 16px;
  transition: opacity var(--tr), background var(--tr), color var(--tr);
  white-space: nowrap; text-decoration: none;
}
.btn:active { opacity: .75; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #4a7de0; }
.btn-ghost { background: none; border: 1px solid var(--border2); color: var(--text-2); }
.btn-ghost:hover { background: var(--surface3); color: var(--text); }
.btn-sm { padding: 7px 14px; font-size: 13px; }
/* Material Icons */
.mi {
  font-family: 'Material Icons'; font-style: normal; font-weight: 400;
  font-size: 20px; line-height: 1; display: inline-flex; align-items: center;
  user-select: none; vertical-align: middle;
}

.btn-icon {
  background: none; border: none; cursor: pointer; color: var(--text-3);
  padding: 7px; border-radius: var(--radius);
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; min-height: 36px;
  transition: color var(--tr), background var(--tr); font-family: var(--font-ui);
}
.btn-icon:hover { color: var(--text); background: var(--surface3); }
.btn-icon.danger:hover { color: var(--red); }

/* toggle switch */
.toggle {
  width: 32px; height: 18px; background: var(--surface3);
  border-radius: 99px; cursor: pointer; position: relative;
  border: none; transition: background var(--tr); flex-shrink: 0;
}
.toggle::after {
  content: ''; position: absolute; width: 14px; height: 14px;
  border-radius: 50%; background: var(--text-3); top: 2px; left: 2px;
  transition: transform var(--tr), background var(--tr);
}
.toggle.on { background: var(--accent-bg); border: 1px solid var(--accent); }
.toggle.on::after { transform: translateX(14px); background: var(--accent); }
.toggle-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); }

/* ═══════════════════════════════════════════════════════════════════
   FORM ELEMENTS
   ═══════════════════════════════════════════════════════════════════ */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 12px; color: var(--text-2); font-weight: 500; }
.input, .textarea, select.input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font: inherit; padding: 9px 12px; outline: none;
  transition: border-color var(--tr); width: 100%;
}
.input:focus, .textarea:focus, select.input:focus { border-color: var(--accent); }
.input::placeholder, .textarea::placeholder { color: var(--text-3); }
.textarea { resize: vertical; min-height: 200px; font-size: 14px; line-height: 1.65; }
select.input option { background: var(--surface2); }

/* ═══════════════════════════════════════════════════════════════════
   OVERLAYS & MODALS
   ═══════════════════════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity var(--tr);
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); width: min(480px, calc(100vw - 28px));
  padding: 24px; max-height: calc(100vh - 56px); overflow-y: auto;
  display: flex; flex-direction: column;
  transform: translateY(10px) scale(.98); transition: transform var(--tr);
}
.overlay.open .modal { transform: none; }
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
.modal-footer.spread { justify-content: space-between; }

/* ═══════════════════════════════════════════════════════════════════
   LANGUAGE PICKER  (modal grid — add language)
   ═══════════════════════════════════════════════════════════════════ */
.lang-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px; overflow-y: auto; max-height: 380px; padding-right: 2px;
}
.lang-grid::-webkit-scrollbar { width: 4px; }
.lang-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.lang-option {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px;
  transition: background var(--tr); border: 1px solid transparent;
}
.lang-option:hover { background: var(--surface2); }
.lang-option.selected { background: var(--accent-bg); border-color: rgba(91,141,238,.3); }
.lang-option .flag { font-size: 20px; line-height: 1; }

/* ═══════════════════════════════════════════════════════════════════
   VIEW: HOME  — single topbar + text list (no sidebar)
   ═══════════════════════════════════════════════════════════════════ */
#view-home { flex-direction: column; }

/* home topbar */
#home-topbar {
  height: 52px; display: flex; align-items: center; gap: 8px;
  padding: 0 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.home-logo {
  font-size: 14px; font-weight: 600; letter-spacing: .03em;
  color: var(--text-2); display: flex; align-items: center; gap: 4px;
  margin-right: 4px; white-space: nowrap;
}
.home-logo span { color: var(--accent); }

/* language dropdown button */
#lang-dropdown-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 6px 10px;
  cursor: pointer; font: inherit; font-size: 13px; font-weight: 500;
  color: var(--text); transition: background var(--tr), border-color var(--tr);
  white-space: nowrap; max-width: 180px;
}
#lang-dropdown-btn:hover { background: var(--surface3); border-color: var(--accent); }
#lang-dropdown-btn .chevron { color: var(--text-3); font-size: 10px; transition: transform var(--tr); }
#lang-dropdown-btn.open .chevron { transform: rotate(180deg); }

/* dropdown panel */
#lang-dropdown-panel {
  position: fixed; z-index: 150;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 6px;
  min-width: 200px; max-height: 320px; overflow-y: auto;
  box-shadow: 0 8px 28px rgba(0,0,0,.5);
  display: none; flex-direction: column; gap: 1px;
}
#lang-dropdown-panel.open { display: flex; }
#lang-dropdown-panel::-webkit-scrollbar { width: 4px; }
#lang-dropdown-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.lang-dd-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: background var(--tr); border: 1px solid transparent;
}
.lang-dd-item:hover { background: var(--surface2); }
.lang-dd-item.active { background: var(--accent-bg); border-color: rgba(91,141,238,.25); color: var(--accent); }
.lang-dd-item .flag { font-size: 17px; }
.lang-dd-item .count {
  margin-left: auto; font-size: 11px; color: var(--text-3);
  background: var(--surface3); border-radius: 99px; padding: 1px 7px;
}
.lang-dd-separator {
  height: 1px; background: var(--border); margin: 4px 0;
}
.lang-dd-add {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; color: var(--text-2);
  transition: background var(--tr);
}
.lang-dd-add:hover { background: var(--surface2); color: var(--text); }

/* spacer pushes gear to the right */
#home-topbar-spacer { flex: 1; }

/* home text area — no second header bar */
#home-texts {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

#home-text-list { flex: 1; overflow-y: auto; padding: 14px 20px; }
#home-text-list::-webkit-scrollbar { width: 6px; }
#home-text-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* text cards */
.text-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; margin-bottom: 8px;
  transition: border-color var(--tr), background var(--tr);
}
.text-card:hover { border-color: var(--border2); background: var(--surface2); }
.text-card:active { background: var(--surface3); }
.text-card-title { flex: 1; font-size: 14px; font-weight: 500; }
.text-card-meta { font-size: 12px; color: var(--text-3); margin-top: 3px; }
.text-card-actions { display: flex; gap: 2px; flex-shrink: 0; }
.home-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 12px; color: var(--text-3); font-size: 14px; padding: 40px;
  text-align: center;
}
.home-empty .icon { font-size: 36px; }

/* settings dropdown */
#settings-panel {
  position: fixed; z-index: 150;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 6px;
  min-width: 180px;
  box-shadow: 0 8px 28px rgba(0,0,0,.5);
  display: none; flex-direction: column; gap: 1px;
}
#settings-panel.open { display: flex; }
.settings-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; color: var(--text-2);
  transition: background var(--tr);
}
.settings-item:hover { background: var(--surface2); color: var(--text); }

@media (max-width: 640px) {
  #home-texts-header { padding: 12px 14px; }
  #home-text-list { padding: 10px 14px; }
  #home-topbar { padding: 0 12px; }
  #lang-dropdown-btn { max-width: 140px; }
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW: READER  (full text)
   ═══════════════════════════════════════════════════════════════════ */
#reader-progress-bar-wrap { height: 2px; background: var(--surface3); flex-shrink: 0; }
#reader-progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width .4s; }

#reader-scroll {
  flex: 1; overflow-y: auto; padding: 52px 24px;
  scroll-behavior: smooth;
}
#reader-scroll::-webkit-scrollbar { width: 6px; }
#reader-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

#reader-content {
  max-width: 660px; margin: 0 auto;
  font-family: var(--font-read); font-size: 19px; line-height: 1.85;
  color: var(--text); user-select: text;
}

/* reader controls in topbar */
#reader-controls { display: flex; align-items: center; gap: 10px; }

/* ═══════════════════════════════════════════════════════════════════
   WORD TOKENS
   ═══════════════════════════════════════════════════════════════════ */
.word {
  cursor: pointer; border-radius: 3px; padding: 0 1px; display: inline;
  transition: background var(--tr);
}
.word:hover { background: var(--surface3); }
.word.highlighted { background: var(--yellow-bg); }
.word.selected { background: var(--accent-bg); outline: 1px solid var(--accent); outline-offset: 1px; }

/* furigana */
.word-wrap { display: inline-block; text-align: center; vertical-align: bottom; }
.word-ruby {
  display: block; font-family: var(--font-ui); font-size: 13px; line-height: 1.3;
  color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 160px; margin-bottom: 2px;
}

/* ═══════════════════════════════════════════════════════════════════
   VIEW: SENTENCE MODE
   ═══════════════════════════════════════════════════════════════════ */
#view-sentence { justify-content: stretch; }

/* sentence topbar has back button + title */
#sentence-topbar { justify-content: flex-start; }
#sentence-topbar .topbar-title { font-size: 13px; color: var(--text-2); font-weight: 400; }

/*
  Sentence slider — fat clickable/draggable track.
  The track element itself is tall (touch target), a ::before pseudo provides
  the visible rail, fill and thumb are absolute inside position:relative track.
*/
#sentence-slider-wrap {
  padding: 0 20px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; gap: 16px; height: 48px;
}
#sentence-slider-track {
  flex: 1; height: 36px; /* tall for easy touch */
  position: relative; cursor: pointer;
  display: flex; align-items: center;
}
/* visible rail */
#sentence-slider-track::before {
  content: ''; position: absolute; left: 0; right: 0; top: 50%;
  transform: translateY(-50%);
  height: 6px; background: var(--surface3); border-radius: 99px;
}
#sentence-slider-fill {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  height: 6px; background: var(--accent); border-radius: 99px;
  width: 0%; pointer-events: none;
}
#sentence-slider-thumb {
  position: absolute; top: 50%; left: 0%;
  transform: translate(-50%, -50%);
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; border: 3px solid var(--accent);
  box-shadow: 0 1px 5px rgba(0,0,0,.5);
  pointer-events: none; z-index: 1;
}
#sentence-counter-label {
  font-size: 13px; color: var(--text-2); white-space: nowrap; flex-shrink: 0;
  font-variant-numeric: tabular-nums; min-width: 56px; text-align: right;
}

/* sentence content area — centered, flex column */
#sentence-scroll {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; gap: 24px;
}

/* counter above the sentence (e.g. "3 / 22") */
#sentence-counter-inline {
  font-size: 13px; color: var(--text-3); letter-spacing: .04em;
  font-variant-numeric: tabular-nums;
}

/* the sentence text itself */
#sentence-text {
  font-family: var(--font-read); font-size: 24px; line-height: 2.4;
  color: var(--text); max-width: 600px; text-align: center;
}

/* prev/next buttons row, close to the text */
#sentence-nav {
  display: flex; align-items: center; gap: 12px;
}
#sentence-nav .btn[disabled] { opacity: .28; cursor: default; pointer-events: none; }

/* finish options (shown only on last sentence, replaces nav) */
#sentence-finish-panel {
  display: none;
  flex-direction: column; align-items: center; gap: 10px;
}
#sentence-finish-panel.visible { display: flex; }
#sentence-finish-panel p { font-size: 13px; color: var(--text-3); }
#sentence-finish-panel .finish-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

/* ═══════════════════════════════════════════════════════════════════
   WORD POPOVER
   ═══════════════════════════════════════════════════════════════════ */
#word-popover {
  position: fixed; z-index: 300;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 16px; width: 280px;
  box-shadow: 0 8px 28px rgba(0,0,0,.5);
  display: none; flex-direction: column; gap: 10px;
}
#word-popover.open { display: flex; }
.pop-word { font-family: var(--font-read); font-size: 17px; font-weight: 500; }

/* meanings list */
.pop-meanings-list { display: flex; flex-direction: column; gap: 2px; }
.pop-meaning-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; color: var(--text-2);
  transition: background var(--tr); border: 1px solid transparent;
  line-height: 1.4;
}
.pop-meaning-item:hover { background: var(--surface2); color: var(--text); }
.pop-meaning-item.fav {
  background: var(--accent-bg); border-color: rgba(91,141,238,.25);
  color: var(--text);
}
.pop-meaning-item .fav-icon {
  font-family: 'Material Icons'; font-size: 16px; flex-shrink: 0;
  color: var(--accent); display: none;
}
.pop-meaning-item.fav .fav-icon { display: inline; }
.pop-meaning-text { flex: 1; }
.pop-del-btn {
  background: none; border: none; cursor: pointer; color: var(--text-3);
  display: inline-flex; align-items: center; padding: 2px; border-radius: 4px;
  opacity: 0; transition: opacity var(--tr), color var(--tr); flex-shrink: 0;
  font-family: 'Material Icons'; font-size: 16px; line-height: 1;
}
.pop-meaning-item:hover .pop-del-btn { opacity: 1; }
.pop-del-btn:hover { color: var(--red); }

.pop-empty {
  font-size: 13px; color: var(--text-3); font-style: italic;
  padding: 4px 2px;
}

.pop-input-row { display: flex; gap: 6px; }
.pop-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font: inherit; font-size: 13px;
  padding: 7px 10px; outline: none; transition: border-color var(--tr);
}
.pop-input:focus { border-color: var(--accent); }
.pop-input::placeholder { color: var(--text-3); }
.pop-save {
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text-2); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 7px 10px; flex-shrink: 0;
  transition: background var(--tr), color var(--tr), border-color var(--tr);
}
.pop-save:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ═══════════════════════════════════════════════════════════════════
   LANG DETECT TOAST
   A non-blocking banner shown below the topbar when a different language
   is detected from what's currently selected.
   ═══════════════════════════════════════════════════════════════════ */
#lang-detect-toast {
  display: none; /* shown via JS */
  align-items: center; gap: 10px;
  padding: 10px 20px; background: var(--surface2);
  border-bottom: 1px solid var(--border); font-size: 13px;
  flex-shrink: 0;
}
#lang-detect-toast.visible { display: flex; }
#lang-detect-msg { flex: 1; color: var(--text-2); }
#lang-detect-msg strong { color: var(--text); }

/* ═══════════════════════════════════════════════════════════════════
   MOBILE ADJUSTMENTS
   ═══════════════════════════════════════════════════════════════════ */
@media (max-width: 640px) {
  #reader-content { font-size: 17px; }
  #sentence-text  { font-size: 19px; }
  #reader-scroll  { padding: 36px 16px; }
  .modal { padding: 18px; }
  .topbar { padding: 0 14px; }
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════
     VIEW: HOME
════════════════════════════════════════════════════════════════ -->
<div class="view active" id="view-home">

  <!-- Home topbar -->
  <div id="home-topbar">
    <div class="home-logo">Reader <span>·</span></div>

    <!-- Language dropdown button -->
    <button id="lang-dropdown-btn" onclick="toggleLangDropdown(event)">
      <span id="lang-dropdown-label">Selecionar idioma</span>
      <span class="chevron">▼</span>
    </button>

    <!-- Language dropdown panel (rendered by JS) -->
    <div id="lang-dropdown-panel"></div>

    <div id="home-topbar-spacer"></div>

    <!-- Add text button (only shown when a lang is selected) -->
    <button class="btn btn-primary btn-sm" onclick="openAddModal()" id="add-text-btn" style="display:none;">

<!-- ════════════════════════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════════════════════ -->
<script>
/* ═══════════════════════════════════════════════════════════════════
   LANGUAGE DEFINITIONS  (25 common learner languages)
   ═══════════════════════════════════════════════════════════════════ */
const LANGUAGES = [
  { code:'en', name:'Inglês',      flag:'🇺🇸' },
  { code:'es', name:'Espanhol',    flag:'🇪🇸' },
  { code:'fr', name:'Francês',     flag:'🇫🇷' },
  { code:'de', name:'Alemão',      flag:'🇩🇪' },
  { code:'it', name:'Italiano',    flag:'🇮🇹' },
  { code:'pt', name:'Português',   flag:'🇵🇹' },
  { code:'ja', name:'Japonês',     flag:'🇯🇵' },
  { code:'ko', name:'Coreano',     flag:'🇰🇷' },
  { code:'zh', name:'Chinês',      flag:'🇨🇳' },
  { code:'ru', name:'Russo',       flag:'🇷🇺' },
  { code:'ar', name:'Árabe',       flag:'🇸🇦' },
  { code:'hi', name:'Hindi',       flag:'🇮🇳' },
  { code:'nl', name:'Holandês',    flag:'🇳🇱' },
  { code:'pl', name:'Polonês',     flag:'🇵🇱' },
  { code:'sv', name:'Sueco',       flag:'🇸🇪' },
  { code:'no', name:'Norueguês',   flag:'🇳🇴' },
  { code:'da', name:'Dinamarquês', flag:'🇩🇰' },
  { code:'fi', name:'Finlandês',   flag:'🇫🇮' },
  { code:'tr', name:'Turco',       flag:'🇹🇷' },
  { code:'cs', name:'Tcheco',      flag:'🇨🇿' },
  { code:'ro', name:'Romeno',      flag:'🇷🇴' },
  { code:'hu', name:'Húngaro',     flag:'🇭🇺' },
  { code:'uk', name:'Ucraniano',   flag:'🇺🇦' },
  { code:'el', name:'Grego',       flag:'🇬🇷' },
  { code:'he', name:'Hebraico',    flag:'🇮🇱' },
];

/* ═══════════════════════════════════════════════════════════════════
   OFFLINE LANGUAGE DETECTION
   Lightweight trigram-based scoring. No external API needed.
   Works by comparing character trigrams in the input text against
   prebuilt trigram profiles for each supported language.
   Accuracy: good for 80+ chars, reliable for 300+ chars.
   ═══════════════════════════════════════════════════════════════════ */

// Characteristic trigram profiles per language (top ~30 each).
// These are the most statistically distinctive trigrams per language.
const LANG_PROFILES = {
  en: ['the','ing','ion','tio','ent','and','for','hat','ter','his','tha','nth','her','ers','ons','all','ati','not','are','but','was','ith','he ','in ','is ','to ','of ','it ','at ','on '],
  es: ['que','de ','la ','ión','el ','en ','nte','los','con','par','una','ado','por','est','del','as ','es ','al ','se ','un ','ara','aci','ien','tra','os ','las','ue ','ent','sta','mos'],
  fr: ['les','ion','que','ent','de ','des','ons','est','ant','la ','ait','ure','ous','et ','eur','le ','tion','une','ais','tre','lle','par','ien','men','ns ','te ','en ','rs ','es ','on '],
  de: ['die','der','ein','und','sch','ich','ung','ten','den','ist','cht','ier','che','auf','hen','gen','eit','sie','mit','für','das','not','wie','von','als','ers','des','im ','en ','er '],
  it: ['che','ion','del','lla','gli','ent','ell','nel','una','con','per','ato','dei','are','ita','ali','nte','all','non','tra','ata','ale','sta','ica','nti','ett','ato','ità','la ','di '],
  pt: ['que','ção','de ','da ','do ','os ','as ','não','com','uma','par','nte','por','ado','em ','tra','es ','ão ','ent','ara','est','nte','al ','se ','um ','no ','na ','ia ','ra ','is '],
  ru: ['ого','ени','ние','ного','для','ста','про','ные','ает','ные','ств','ова','что','ост','при','это','его','ние','ии ','на ','не ','по ','то ','как','так','же ','от ','но ','из ','он '],
  uk: ['ого','ння','ого','для','про','ста','ові','ати','ень','ної','що ','не ','на ','як ','але','від','або','між','так','вже','до ','по ','та ','це ','він','ми ','ви ','ні ','ї ','ї '],
  pl: ['nie','prz','rze','się','cie','owy','ach','ego','nia','że ','na ','do ','się','jak','ale','czy','jest','lat','ze ','po ','to ','co ','też','już','tak','tej','jego','jest','nie ','się '],
  nl: ['van','een','het','ing','den','ver','aan','dat','sch','zij','die','oor','gen','voor','nen','men','ier','met','bij','niet','zijn','ook','als','maar','werd','dit','heeft','meer','kan ','ze '],
  sv: ['och','att','det','som','för','ing','ade','sig','med','den','ett','han','men','are','ter','er ','av ','på ','de ','en ','är ','ha ','om ','vi ','sa ','ge ','nu ','se ','då ','så '],
  da: ['og ','er ','det','for','til','der','med','som','en ','sig','jeg','man','han','af ','ved','fra','har','ede','kan','men','på ','at ','de ','at ','er ','vi ','et ','om ','her','nu '],
  no: ['og ','er ','det','for','til','med','en ','som','jeg','ikke','kan','men','på ','de ','den','har','at ','av ','om ','et ','vi ','seg','han','men','fra','noe','bli','er ','da ','år '],
  fi: ['ään','ssa','lla','nen','sta','tta','ise','iin','nta','ään','en ','ja ','on ','ei ','se ','ne ','he ','te ','me ','ole','hän','kun','tai','nyt','yli','siis','myös','kin','voi','sen'],
  tr: ['bir','ile','nin','lar','ler','ın ','in ','da ','de ','den','ını','lar','ler','yor','an ','en ','bu ','ne ','ki ','dı ','ye ','ya ','as ','es ','mı ','mu ','mi ','bir','ise','ama'],
  cs: ['pro','ter','pře','že ','na ','se ','je ','ale','ale','jak','by ','ve ','při','svě','kde','si ','jen','ten','jak','tak','byl','již','zde','před','být','tím','tom','do ','co ','to '],
  ro: ['are','ion','ent','ilor','că ','în ','nu ','se ','din','mai','sau','tot','lui','și ','de ','la ','cu ','un ','al ','pe ','pentru','ale','cei','cel','este','fie','ani','care','prin','între'],
  hu: ['egy','hez','nek','meg','vel','ból','ből','ban','ben','hogy','nem','van','ezt','azt','is ','de ','én ','ő ','mi ','ti ','el ','ki ','be ','le ','fel','ami','aki','ez ','az ','és '],
  el: ['και','την','τον','ότι','για','στη','στο','που','δεν','τους','τις','ους','ων ','ει ','να ','το ','τα ','τη ','οι ','με ','δε ','ας ','σε ','μι ','αν ','αι ','ου ','πω','ής ','ής '],
  he: ['של','את','הה','לא','הם','זה','עם','כל','שה','מה','אל','על','בה','כי','אנ','הן','יש','רה','ים','ות','ית','ני','ות','ות','ות','ות','ות','ות','ות','ות'],
  ar: ['وال','في ','من ','على','ذي ','ان ','ين ','الم','لا ','ال ','هذا','كان','إلى','بال','وال','بعد','ما ','قد ','هم ','هي ','له ','أن ','قال','من ','عن ','لقد','كل ','عند','بين','حتى'],
  hi: ['के ','का ','की ','है ','में','एक','कि ','और','से ','को ','पर ','यह','था','वह','हैं','थे','नहीं','लिए','तो ','भी ','जो ','उन','आ ','हो ','दे ','रह','जा ','आप','हम ','सक'],
  zh: ['的 ','了 ','在 ','是 ','我 ','有 ','他 ','不 ','这 ','中 ','来 ','上 ','大 ','为 ','和 ','国 ','到 ','就 ','也 ','可 ','年 ','着 ','说 ','人 ','那 ','地 ','要 ','时 ','道 ','出 '],
  ja: ['する','いる','ある','です','ます','から','ため','こと','その','れる','られ','てい','のが','た。','る。','い。','は、','が、','を、','の、','と、','に、','で、','も、','て、','な、','たり','たい','れた','した'],
  ko: ['이다','하는','있는','것이','그리','에서','으로','에게','하고','한다','있다','이고','이며','이나','이를','이가','했다','한국','것을','들이','들의','에는','에도','에게','가장','되는','하여','에서','한다','있어'],
};

/**
 * Detect language of a text string.
 * Returns { code, name, flag } of the best match, or null if text is too short.
 *
 * Algorithm:
 *   1. Extract all character trigrams from the cleaned input.
 *   2. For each language profile, count how many of its trigrams appear in the input.
 *   3. Return the language with the highest overlap score.
 */
function detectLanguage(text) {
  const cleaned = text.toLowerCase().replace(/\s+/g, ' ');
  if (cleaned.length < 60) return null; // too short to be reliable

  // Build a set of trigrams from the input
  const inputTrigrams = new Set();
  for (let i = 0; i < cleaned.length - 2; i++) {
    inputTrigrams.add(cleaned.slice(i, i + 3));
  }

  let bestCode  = null;
  let bestScore = 0;

  for (const [code, profile] of Object.entries(LANG_PROFILES)) {
    // Score = number of profile trigrams present in input
    const score = profile.reduce((n, t) => n + (inputTrigrams.has(t) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; bestCode = code; }
  }

  // Require at least 4 trigram hits to avoid false positives on very short text
  if (bestScore < 4) return null;
  return LANGUAGES.find(l => l.code === bestCode) || null;
}

/* ═══════════════════════════════════════════════════════════════════
   STATE
   Text schema:  { id, lang, title, body, favorites:{[key]:number}, createdAt }
   globalMeanings: { [wordKey]: string[] }  — shared across all texts
   favorites:    per-text index into globalMeanings[key]
   ═══════════════════════════════════════════════════════════════════ */
const state = {
  activeLangs:      [],    // language codes the user has added
  currentLang:      null,  // currently selected language on home screen
  currentTextId:    null,  // text open in reader/sentence view
  texts:            {},    // { [id]: TextObject }
  globalMeanings:   {},    // { [wordKey]: string[] }
  readerMode:       false, // furigana toggle
  currentSentence:  0,
  sentences:        [],
  detectedLang:     null,  // populated by lang detect in reader/modal
};

/* ═══════════════════════════════════════════════════════════════════
   PERSISTENCE
   Storage key upgraded to reader_v4 to accommodate new data model.
   Migration: if old reader_v3 data exists with per-text meanings,
   it is converted to globalMeanings on first load.
   ═══════════════════════════════════════════════════════════════════ */
function save() {
  try {
    localStorage.setItem('reader_v4', JSON.stringify({
      activeLangs:    state.activeLangs,
      currentLang:    state.currentLang,
      currentTextId:  state.currentTextId,
      texts:          state.texts,
      globalMeanings: state.globalMeanings,
    }));
  } catch(e) { console.warn('Save failed', e); }
}

function load() {
  try {
    // Try new format first
    let s = JSON.parse(localStorage.getItem('reader_v4') || 'null');

    // Migrate from v3 if needed
    if (!s) {
      const old = JSON.parse(localStorage.getItem('reader_v3') || '{}');
      if (old.texts) {
        s = { ...old, globalMeanings: {} };
        // Lift per-text meanings into globalMeanings
        Object.values(old.texts).forEach(t => {
          if (!t.meanings) return;
          Object.entries(t.meanings).forEach(([key, m]) => {
            const val = typeof m === 'string' ? m : m.val;
            if (!val) return;
            if (!s.globalMeanings[key]) s.globalMeanings[key] = [];
            if (!s.globalMeanings[key].includes(val)) s.globalMeanings[key].push(val);
          });
          // Remove old meanings from text, add empty favorites
          t.favorites = {};
          delete t.meanings;
        });
      }
    }

    if (!s) return;
    if (Array.isArray(s.activeLangs)) state.activeLangs = s.activeLangs;
    if (s.texts)          state.texts          = s.texts;
    if (s.globalMeanings) state.globalMeanings  = s.globalMeanings;
    if (s.currentLang)    state.currentLang    = s.currentLang;
    if (s.currentTextId && state.texts[s.currentTextId])
      state.currentTextId = s.currentTextId;

    // Ensure all texts have a favorites map
    Object.values(state.texts).forEach(t => {
      if (!t.favorites) t.favorites = {};
    });
  } catch(e) { console.warn('Load failed', e); }
}

function exportData() {
  const blob = new Blob([JSON.stringify({
    activeLangs:    state.activeLangs,
    texts:          state.texts,
    globalMeanings: state.globalMeanings,
  }, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `reader-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.texts) {
        Object.entries(d.texts).forEach(([id, t]) => {
          if (!t.favorites) t.favorites = {};
          state.texts[id] = t;
        });
      }
      if (d.globalMeanings) {
        Object.entries(d.globalMeanings).forEach(([key, vals]) => {
          if (!state.globalMeanings[key]) state.globalMeanings[key] = [];
          vals.forEach(v => { if (!state.globalMeanings[key].includes(v)) state.globalMeanings[key].push(v); });
        });
      }
      if (Array.isArray(d.activeLangs)) {
        d.activeLangs.forEach(c => { if (!state.activeLangs.includes(c)) state.activeLangs.push(c); });
      }
      save(); renderHome();
      alert(`${Object.keys(d.texts || {}).length} textos importados.`);
    } catch { alert('Arquivo inválido.'); }
  };
  r.readAsText(file);
  event.target.value = '';
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════ */

/** Update the language dropdown button label */
function renderLangDropdownBtn() {
  const lang  = LANGUAGES.find(l => l.code === state.currentLang);
  const label = document.getElementById('lang-dropdown-label');
  label.textContent = lang ? `${lang.flag} ${lang.name}` : 'Selecionar idioma';
}

/** Build and show the language dropdown panel */
function renderLangDropdownPanel() {
  const panel = document.getElementById('lang-dropdown-panel');
  let html = '';

  if (state.activeLangs.length) {
    html += state.activeLangs.map(code => {
      const lang  = LANGUAGES.find(l => l.code === code);
      const count = Object.values(state.texts).filter(t => t.lang === code).length;
      if (!lang) return '';
      return `<div class="lang-dd-item ${state.currentLang === code ? 'active' : ''}"
                   onclick="selectHomeLang('${code}')">
                 <span class="flag">${lang.flag}</span>
                 <span style="flex:1">${lang.name}</span>
                 <span class="count">${count}</span>
               </div>`;
    }).join('');
    html += '<div class="lang-dd-separator"></div>';
  }

  html += `<div class="lang-dd-add" onclick="closeLangDropdown(); openLangModal()">
             <span style="font-size:14px">＋</span> Adicionar idioma
           </div>`;

  panel.innerHTML = html;
}

function selectHomeLang(code) {
  state.currentLang = code;
  closeLangDropdown();
  save(); renderHome();
}

/* ── Language dropdown open/close ───────────────────────────────── */
function toggleLangDropdown(event) {
  event.stopPropagation();
  const btn   = document.getElementById('lang-dropdown-btn');
  const panel = document.getElementById('lang-dropdown-panel');
  const open  = panel.classList.contains('open');
  closeAllDropdowns();
  if (!open) {
    renderLangDropdownPanel();
    // Position below the button
    const rect = btn.getBoundingClientRect();
    panel.style.top  = (rect.bottom + 6) + 'px';
    panel.style.left = rect.left + 'px';
    panel.classList.add('open');
    btn.classList.add('open');
  }
}

function closeLangDropdown() {
  document.getElementById('lang-dropdown-panel').classList.remove('open');
  document.getElementById('lang-dropdown-btn').classList.remove('open');
}

/* ── Settings panel open/close ──────────────────────────────────── */
function toggleSettingsPanel(event) {
  event.stopPropagation();
  const btn   = document.getElementById('settings-btn');
  const panel = document.getElementById('settings-panel');
  const open  = panel.classList.contains('open');
  closeAllDropdowns();
  if (!open) {
    const rect = btn.getBoundingClientRect();
    panel.style.top   = (rect.bottom + 6) + 'px';
    panel.style.right = (window.innerWidth - rect.right) + 'px';
    panel.style.left  = 'auto';
    panel.classList.add('open');
  }
}

function closeSettingsPanel() {
  document.getElementById('settings-panel').classList.remove('open');
}

function closeAllDropdowns() {
  closeLangDropdown();
  closeSettingsPanel();
}

// Close dropdowns on outside click
document.addEventListener('click', () => closeAllDropdowns());

function renderHomeTextList() {
  const lang   = LANGUAGES.find(l => l.code === state.currentLang);
  const addBtn = document.getElementById('add-text-btn');
  const list   = document.getElementById('home-text-list');

  if (!state.currentLang || !lang) {
    addBtn.style.display = 'none';
    list.innerHTML = '<div class="home-empty"><div class="icon">🌐</div><p>Selecione um idioma no menu acima.</p></div>';
    return;
  }

  addBtn.style.display = '';

  const texts = Object.values(state.texts)
    .filter(t => t.lang === state.currentLang)
    .sort((a,b) => b.createdAt - a.createdAt);

  if (!texts.length) {
    list.innerHTML = `<div class="home-empty"><div class="icon">📄</div><p>Nenhum texto em ${lang.name} ainda.<br>Clique em "Adicionar texto" para começar.</p></div>`;
    return;
  }

  list.innerHTML = texts.map(t => {
    const wordCount = t.body.trim().split(/\s+/).length;
    const annCount  = Object.keys(t.favorites || {}).filter(k => (state.globalMeanings[k] || []).length > 0).length;
    return `
      <div class="text-card" onclick="openText('${t.id}')">
        <div style="flex:1">
          <div class="text-card-title">${escHtml(t.title)}</div>
          <div class="text-card-meta">${wordCount} palavras · ${annCount} anotações</div>
        </div>
        <div class="text-card-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openEditModal('${t.id}')" title="Editar"><span class="mi">edit</span></button>
          <button class="btn-icon danger" onclick="openDelModal('${t.id}')" title="Deletar"><span class="mi">delete</span></button>
        </div>
      </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════════
   LANGUAGE MODAL  (add a language to the active list)
   ═══════════════════════════════════════════════════════════════════ */
function openLangModal() {
  const grid = document.getElementById('lang-grid');
  grid.innerHTML = LANGUAGES.map(l => `
    <div class="lang-option ${state.activeLangs.includes(l.code) ? 'selected' : ''}"
         onclick="toggleActiveLang('${l.code}')">
      <span class="flag">${l.flag}</span><span>${l.name}</span>
    </div>`).join('');
  document.getElementById('lang-overlay').classList.add('open');
}

function closeLangModal() { document.getElementById('lang-overlay').classList.remove('open'); }

function toggleActiveLang(code) {
  if (state.activeLangs.includes(code)) {
    // Only remove if no texts use it
    const inUse = Object.values(state.texts).some(t => t.lang === code);
    if (inUse) { alert('Remova todos os textos deste idioma antes de removê-lo.'); return; }
    state.activeLangs = state.activeLangs.filter(c => c !== code);
    if (state.currentLang === code) state.currentLang = state.activeLangs[0] || null;
  } else {
    state.activeLangs.push(code);
    if (!state.currentLang) state.currentLang = code;
  }
  save(); renderHome(); openLangModal(); // re-render grid and dropdown
}

/* ═══════════════════════════════════════════════════════════════════
   ADD / EDIT TEXT MODAL
   Language <select> lets user move a text to a different language.
   ═══════════════════════════════════════════════════════════════════ */
let editingTextId    = null;
let detectDebounce   = null;
let detectedInModal  = null; // detected lang code in the modal

function populateLangSelect() {
  document.getElementById('text-lang-select').innerHTML =
    LANGUAGES.map(l => `<option value="${l.code}">${l.flag} ${l.name}</option>`).join('');
}

function openAddModal() {
  editingTextId = null;
  document.getElementById('text-modal-title').textContent = 'Adicionar texto';
  document.getElementById('text-title-input').value = '';
  document.getElementById('text-body-input').value  = '';
  document.getElementById('text-lang-select').value = state.currentLang || 'en';
  document.getElementById('modal-detect-warn').style.display = 'none';
  detectedInModal = null;
  document.getElementById('text-overlay').classList.add('open');
  setTimeout(() => document.getElementById('text-title-input').focus(), 80);
}

function openEditModal(id) {
  editingTextId = id;
  const t = state.texts[id];
  document.getElementById('text-modal-title').textContent = 'Editar texto';
  document.getElementById('text-title-input').value = t.title;
  document.getElementById('text-body-input').value  = t.body;
  document.getElementById('text-lang-select').value = t.lang;
  document.getElementById('modal-detect-warn').style.display = 'none';
  detectedInModal = null;
  document.getElementById('text-overlay').classList.add('open');
  setTimeout(() => document.getElementById('text-title-input').focus(), 80);
}

function closeTextModal() {
  document.getElementById('text-overlay').classList.remove('open');
  clearTimeout(detectDebounce);
}

/**
 * Debounced language detection as user types in the text area.
 * Warns if detected language differs from the selected one.
 */
function scheduleDetect() {
  clearTimeout(detectDebounce);
  detectDebounce = setTimeout(() => {
    const body     = document.getElementById('text-body-input').value;
    const selected = document.getElementById('text-lang-select').value;
    const detected = detectLanguage(body);
    const warn     = document.getElementById('modal-detect-warn');
    detectedInModal = null;

    if (detected && detected.code !== selected) {
      const detectedLang = LANGUAGES.find(l => l.code === detected.code);
      const selectedLang = LANGUAGES.find(l => l.code === selected);
      detectedInModal = detected.code;
      warn.style.display = '';
      warn.innerHTML = `
        <strong>${detectedLang.flag} ${detectedLang.name} detectado.</strong>
        O idioma selecionado é ${selectedLang.flag} ${selectedLang.name}.
        <button class="btn btn-sm btn-ghost" style="margin-left:8px;"
                onclick="applyModalDetect()">Mudar para ${detectedLang.name}</button>`;
    } else {
      warn.style.display = 'none';
    }
  }, 600);
}

function applyModalDetect() {
  if (detectedInModal) {
    document.getElementById('text-lang-select').value = detectedInModal;
    // Add language to active list if not present
    if (!state.activeLangs.includes(detectedInModal)) {
      state.activeLangs.push(detectedInModal);
      save();
    }
    document.getElementById('modal-detect-warn').style.display = 'none';
    detectedInModal = null;
  }
}

function saveText() {
  const title = document.getElementById('text-title-input').value.trim();
  const body  = document.getElementById('text-body-input').value.trim();
  const lang  = document.getElementById('text-lang-select').value;
  if (!title || !body) return;

  // Ensure language is in active list
  if (!state.activeLangs.includes(lang)) state.activeLangs.push(lang);

  if (editingTextId) {
    Object.assign(state.texts[editingTextId], { title, body, lang });
  } else {
    const id = 'txt_' + Date.now();
    state.texts[id] = { id, lang, title, body, favorites: {}, createdAt: Date.now() };
  }

  // If language changed, update currentLang to match
  state.currentLang = lang;
  save(); renderHome(); closeTextModal();
}

async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('text-body-input').value = text;
    scheduleDetect();
  } catch { alert('Permissão negada. Cole manualmente com Ctrl+V / Cmd+V.'); }
}

/* ═══════════════════════════════════════════════════════════════════
   DELETE MODAL
   ═══════════════════════════════════════════════════════════════════ */
let deletingId = null;
function openDelModal(id)  { deletingId = id; document.getElementById('del-overlay').classList.add('open'); }
function closeDelModal()   { document.getElementById('del-overlay').classList.remove('open'); }
function confirmDelete() {
  if (!deletingId) return;
  delete state.texts[deletingId];
  if (state.currentTextId === deletingId) state.currentTextId = null;
  deletingId = null; save(); renderHome(); closeDelModal();
}

/* ═══════════════════════════════════════════════════════════════════
   READER VIEW — open text, render, progress
   ═══════════════════════════════════════════════════════════════════ */
function openText(id) {
  if (!state.texts[id]) return;
  state.currentTextId = id;
  const t = state.texts[id];
  state.currentLang = t.lang;
  save();

  document.getElementById('reader-title').textContent = t.title;
  document.getElementById('toggle-reader-mode').className =
    'toggle' + (state.readerMode ? ' on' : '');

  // Render text
  renderReaderContent(id);

  // Run language detection on the loaded text
  runReaderLangDetect(t);

  showView('view-reader');
  document.getElementById('reader-scroll').scrollTop = 0;
  updateReaderProgress();
}

function closeReader() {
  dismissLangToast();
  closePopover();
  showView('view-home');
  renderHome(); // refresh word/annotation counts
}

function updateReaderProgress() {
  const el  = document.getElementById('reader-scroll');
  const max = el.scrollHeight - el.clientHeight;
  document.getElementById('reader-progress-bar').style.width =
    max > 0 ? (el.scrollTop / max) * 100 + '%' : '0%';
}

/* ── Language detect in reader (non-blocking toast) ─────────────── */
function runReaderLangDetect(t) {
  const detected = detectLanguage(t.body);
  if (!detected || detected.code === t.lang) { dismissLangToast(); return; }

  const detLang = LANGUAGES.find(l => l.code === detected.code);
  const curLang = LANGUAGES.find(l => l.code === t.lang);
  state.detectedLang = detected.code;

  document.getElementById('lang-detect-msg').innerHTML =
    `Texto parece ser <strong>${detLang.flag} ${detLang.name}</strong>, mas está em ${curLang.flag} ${curLang.name}.`;
  document.getElementById('lang-detect-toast').classList.add('visible');
}

function applyDetectedLang() {
  if (!state.detectedLang || !state.currentTextId) return;
  const lang = state.detectedLang;
  state.texts[state.currentTextId].lang = lang;
  if (!state.activeLangs.includes(lang)) state.activeLangs.push(lang);
  state.currentLang = lang;
  save(); renderHome(); dismissLangToast();
}

function dismissLangToast() {
  document.getElementById('lang-detect-toast').classList.remove('visible');
  state.detectedLang = null;
}

/* ═══════════════════════════════════════════════════════════════════
   TOKENIZER
   Preserves hyphenated words (e.g. "по-русски") as a single unit.
   Uses Unicode property escapes for correct multilingual handling.
   ═══════════════════════════════════════════════════════════════════ */
function tokenize(text) {
  return text.match(/[\p{L}\p{N}]+-[\p{L}\p{N}]+(?:-[\p{L}\p{N}]+)*|[\p{L}\p{N}]+|[^\p{L}\p{N}]/gu) || [];
}
function isWordTok(t) { return /[\p{L}\p{N}]/u.test(t); }

function buildWordSpan(word) {
  const key = word.toLowerCase();
  const has = (state.globalMeanings[key] || []).length > 0;
  const cls = has ? 'word highlighted' : 'word';
  return `<span class="${cls}" data-word="${escAttr(word)}" data-key="${escAttr(key)}" onclick="wordClick(this,event)">${escHtml(word)}</span>`;
}

function renderReaderContent(id) {
  const t      = state.texts[id];
  const tokens = tokenize(t.body);
  const html   = tokens.map(tok => {
    if (!isWordTok(tok)) return tok === '\n' ? '<br>' : escHtml(tok);
    return buildWordSpan(tok);
  }).join('');
  document.getElementById('reader-content').innerHTML = html;
  applyReaderMode();
}

/* ═══════════════════════════════════════════════════════════════════
   READER MODE  (furigana — show saved meaning above word)
   ═══════════════════════════════════════════════════════════════════ */
function toggleReaderMode() {
  state.readerMode = !state.readerMode;
  document.getElementById('toggle-reader-mode').classList.toggle('on', state.readerMode);
  applyReaderMode();
}

function applyReaderMode() {
  if (!state.currentTextId) return;
  const t = state.texts[state.currentTextId];
  document.querySelectorAll('.word').forEach(el => {
    const key      = el.dataset.key;
    const meanings = state.globalMeanings[key] || [];
    // Reset to plain word
    el.innerHTML = escHtml(el.dataset.word);
    // Wrap with ruby if mode is on and at least one meaning exists
    if (state.readerMode && meanings.length > 0) {
      const favIdx = t.favorites[key] ?? 0;
      const label  = meanings[Math.min(favIdx, meanings.length - 1)];
      el.innerHTML = `<span class="word-wrap"><span class="word-ruby">${escHtml(label)}</span>${escHtml(el.dataset.word)}</span>`;
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════
   WORD POPOVER  — multiple meanings
   ═══════════════════════════════════════════════════════════════════ */
let activeWordEl = null;

function wordClick(el, event) {
  event.stopPropagation();
  if (activeWordEl === el) { closePopover(); return; }
  if (activeWordEl) activeWordEl.classList.remove('selected');
  activeWordEl = el;
  el.classList.add('selected');
  showPopover(el);
}

/** Render the meanings list inside the popover for the given word key */
function renderPopoverMeanings(key) {
  const t        = state.texts[state.currentTextId];
  const meanings = state.globalMeanings[key] || [];
  const favIdx   = t.favorites[key] ?? 0;
  const list     = document.getElementById('pop-meanings-list');

  if (!meanings.length) {
    list.innerHTML = '<div class="pop-empty">Sem significados ainda.</div>';
    return;
  }

  list.innerHTML = meanings.map((val, i) => {
    const isFav = i === Math.min(favIdx, meanings.length - 1);
    return `
      <div class="pop-meaning-item ${isFav ? 'fav' : ''}"
           onclick="setFavorite('${escAttr(key)}', ${i})">
        <span class="fav-icon">check</span>
        <span class="pop-meaning-text">${escHtml(val)}</span>
        <button class="pop-del-btn" onclick="deleteMeaning(event,'${escAttr(key)}',${i})"
                title="Remover">delete</button>
      </div>`;
  }).join('');
}

function showPopover(el) {
  const key = el.dataset.key;
  document.getElementById('pop-word-text').textContent = el.dataset.word;
  document.getElementById('pop-input').value = '';

  renderPopoverMeanings(key);

  const pop = document.getElementById('word-popover');
  pop.classList.add('open');
  positionPopover(el);
  setTimeout(() => document.getElementById('pop-input').focus(), 60);
}

function positionPopover(el) {
  const pop  = document.getElementById('word-popover');
  const rect = el.getBoundingClientRect();
  const pw = 280;
  const vw = window.innerWidth, vh = window.innerHeight;
  // Estimate height based on meaning count
  const key  = el.dataset.key;
  const cnt  = (state.globalMeanings[key] || []).length;
  const ph   = 80 + Math.min(cnt, 5) * 38;
  let top  = rect.bottom + 8;
  let left = rect.left;
  if (left + pw > vw - 12) left = vw - pw - 12;
  if (left < 12)           left = 12;
  if (top  + ph > vh - 12) top  = rect.top - ph - 8;
  if (top < 8) top = 8;
  pop.style.top  = top + 'px';
  pop.style.left = left + 'px';
}

function closePopover() {
  document.getElementById('word-popover').classList.remove('open');
  document.getElementById('pop-input').value = '';
  if (activeWordEl) { activeWordEl.classList.remove('selected'); activeWordEl = null; }
}

document.addEventListener('click', e => {
  if (!document.getElementById('word-popover').contains(e.target)) closePopover();
});

document.getElementById('pop-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addMeaning(); }
});

/** Add a new meaning to globalMeanings for the active word */
function addMeaning() {
  if (!activeWordEl || !state.currentTextId) return;
  const key = activeWordEl.dataset.key;
  const val = document.getElementById('pop-input').value.trim();
  if (!val) return;

  if (!state.globalMeanings[key]) state.globalMeanings[key] = [];

  // Don't add duplicates
  if (!state.globalMeanings[key].includes(val)) {
    state.globalMeanings[key].push(val);
  }

  // If this is the first meaning, auto-set as favorite (idx 0)
  const t = state.texts[state.currentTextId];
  if (!(key in t.favorites)) t.favorites[key] = 0;

  document.getElementById('pop-input').value = '';

  // Update highlight on all matching word spans
  syncWordHighlight(key);
  renderPopoverMeanings(key);
  positionPopover(activeWordEl);
  save();
  applyReaderMode();
}

/** Set a meaning as favorite for the current text */
function setFavorite(key, idx) {
  if (!state.currentTextId) return;
  const t = state.texts[state.currentTextId];
  t.favorites[key] = idx;
  renderPopoverMeanings(key);
  save();
  applyReaderMode();
}

/** Delete a meaning from globalMeanings; adjust favorites across all texts */
function deleteMeaning(event, key, idx) {
  event.stopPropagation(); // don't trigger setFavorite on the row
  const meanings = state.globalMeanings[key];
  if (!meanings) return;

  meanings.splice(idx, 1);

  if (meanings.length === 0) {
    // No meanings left — remove key entirely, clear favorites everywhere
    delete state.globalMeanings[key];
    Object.values(state.texts).forEach(t => { delete t.favorites[key]; });
    syncWordHighlight(key);
    closePopover();
  } else {
    // Adjust per-text favorites: if fav pointed at or past deleted idx, clamp to 0
    Object.values(state.texts).forEach(t => {
      if (t.favorites[key] !== undefined) {
        if (t.favorites[key] >= idx) t.favorites[key] = 0;
      }
    });
    renderPopoverMeanings(key);
    positionPopover(activeWordEl);
  }

  save();
  applyReaderMode();
}

/** Sync the .highlighted class on all spans for a given word key */
function syncWordHighlight(key) {
  const has = (state.globalMeanings[key] || []).length > 0;
  document.querySelectorAll(`.word[data-key="${CSS.escape(key)}"]`).forEach(w => {
    w.classList.toggle('highlighted', has);
  });
}

/* ═══════════════════════════════════════════════════════════════════
   SENTENCE MODE

   Navigation:
     • Click on slider track → jump to sentence at that %
     • Drag slider thumb → scrub (mousedown+mousemove, touch)
     • Swipe left/right on sentence text area
     • ← → keyboard keys
     • Prev/Next buttons
   ═══════════════════════════════════════════════════════════════════ */
function splitSentences(body) {
  return body.split(/(?<=[.!?。！？])\s+/).filter(s => s.trim().length);
}

function enterSentenceMode() {
  state.sentences      = splitSentences(state.texts[state.currentTextId].body);
  state.currentSentence = 0;
  document.getElementById('sentence-title').textContent = state.texts[state.currentTextId].title;
  showView('view-sentence');
  renderSentence();
}

function exitSentenceMode() {
  closePopover();
  showView('view-reader');
}

/** Render the current sentence into the sentence view */
function renderSentence() {
  const { sentences, currentSentence: idx } = state;
  const total    = sentences.length;
  const sentence = sentences[Math.min(idx, total - 1)];
  const t        = state.texts[state.currentTextId];

  // Tokenize sentence same as full reader
  const html = tokenize(sentence).map(tok => {
    if (!isWordTok(tok)) return tok === '\n' ? '<br>' : escHtml(tok);
    return buildWordSpan(tok);
  }).join('');

  document.getElementById('sentence-text').innerHTML = html;
  applyReaderMode();

  // Update slider position
  const pct = total > 1 ? (idx / (total - 1)) * 100 : 100;
  document.getElementById('sentence-slider-fill').style.width = pct + '%';
  document.getElementById('sentence-slider-thumb').style.left = pct + '%';

  // Update both counter displays
  const label = `${idx + 1} / ${total}`;
  document.getElementById('sentence-counter-label').textContent  = label;
  document.getElementById('sentence-counter-inline').textContent = label;

  const isLast = idx >= total - 1;

  // Prev/Next buttons
  document.getElementById('sent-prev').disabled = idx === 0;
  document.getElementById('sent-next').disabled = isLast;

  // Show finish panel only on last sentence; hide nav buttons
  document.getElementById('sentence-nav').style.display          = isLast ? 'none' : 'flex';
  document.getElementById('sentence-finish-panel').classList.toggle('visible', isLast);
}

function goPrev() {
  if (state.currentSentence > 0) { state.currentSentence--; renderSentence(); }
}
function goNext() {
  if (state.currentSentence < state.sentences.length - 1) { state.currentSentence++; renderSentence(); }
}

/** Jump to sentence at a given 0–1 ratio */
function jumpToRatio(ratio) {
  const total = state.sentences.length;
  state.currentSentence = Math.round(Math.max(0, Math.min(1, ratio)) * (total - 1));
  renderSentence();
}

/** Compute ratio from a pointer/mouse X position on the track element */
function ratioFromEvent(trackEl, clientX) {
  const rect = trackEl.getBoundingClientRect();
  return (clientX - rect.left) / rect.width;
}

/* ── Slider: click ────────────────────────────────────────────── */
function sliderClick(event) {
  // Ignore if this was a drag (handled by mouseup)
  if (sliderDragging) return;
  jumpToRatio(ratioFromEvent(event.currentTarget, event.clientX));
}

/* ── Slider: mouse drag ───────────────────────────────────────── */
let sliderDragging = false;

function sliderMouseDown(event) {
  sliderDragging = false; // reset; we'll flag true only on move
  const track = event.currentTarget;
  const onMove = e => {
    sliderDragging = true;
    jumpToRatio(ratioFromEvent(track, e.clientX));
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    // Small delay so sliderClick sees the flag
    setTimeout(() => { sliderDragging = false; }, 50);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* ── Slider: touch (drag + swipe on sentence text) ───────────── */
let touchStartX  = null;
let touchStartIdx = null;

function sliderTouchStart(event) {
  touchStartX   = event.touches[0].clientX;
  touchStartIdx = state.currentSentence;
}
function sliderTouchMove(event) {
  event.preventDefault();
  const track = event.currentTarget;
  jumpToRatio(ratioFromEvent(track, event.touches[0].clientX));
}
function sliderTouchEnd() { touchStartX = null; }

/* ── Swipe on sentence text area ─────────────────────────────── */
let swipeStartX = null;
const sentScroll = document.getElementById('sentence-scroll');

sentScroll.addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
}, { passive: true });

sentScroll.addEventListener('touchend', e => {
  if (swipeStartX === null) return;
  const dx = swipeStartX - e.changedTouches[0].clientX;
  // Only register as swipe if horizontal movement > 40px
  if (Math.abs(dx) > 40) {
    dx > 0 ? goNext() : goPrev();
  }
  swipeStartX = null;
});

/* ── Finish options ───────────────────────────────────────────── */
function finishClose() {
  // End session → go back to home
  closePopover();
  showView('view-home');
  renderHome();
}

function finishFullText() {
  // Exit sentence mode → show full text from top
  closePopover();
  showView('view-reader');
  document.getElementById('reader-scroll').scrollTop = 0;
  updateReaderProgress();
}

/* ═══════════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePopover();
    closeLangModal();
    closeTextModal();
    closeDelModal();
  }
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  const inSentence = document.getElementById('view-sentence').classList.contains('active');
  if (inSentence) {
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
  }
});

/* ═══════════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ═══════════════════════════════════════════════════════════════════
   START
   ═══════════════════════════════════════════════════════════════════ */
init();
</script>
